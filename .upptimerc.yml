status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  baseUrl: /upptime
  logoUrl: https://avatars.githubusercontent.com/u/a920604a
  name: a920604a Status
  introTitle: "All Systems Status"
  introMessage: Real-time uptime monitoring for all my projects. Powered by GitHub Actions.
  navbar:
    - title: Status
      href: /upptime
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  theme: ocean # See https://upptime.js.org/docs/configuration#theme for more themes
  customCss: >
    :root {
      --body-background-color: #071a2e;
      --card-background-color: #0d2845;
      --nav-background-color: #0a1f38;
      --nav-border-bottom-color: #1a4a7a;
      --body-text-color: #cce8ff;
      --text-muted: #7ab8d9;
      --link-color: #40c8f0;
      --success-color: #20c997;
      --danger-color: #ff6b6b;
      --warning-color: #ffd166;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(180deg, #071a2e 0%, #0a2540 100%); }
    .navbar { box-shadow: 0 1px 0 rgba(26,74,122,0.8); }
    .card { border-radius: 12px; border: 1px solid #1a4a7a; transition: transform 0.2s; background: linear-gradient(135deg, #0d2845 0%, #0f3060 100%); }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,80,160,0.4); }
    h1, h2 { letter-spacing: -0.5px; color: #7fd4f8; }

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
